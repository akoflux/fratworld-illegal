<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tâches Staff — FratWorld Staff</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<div class="app-wrapper">
  <div id="navbar"></div>
  <main class="page-content">

    <div class="page-header">
      <div class="page-header-left">
        <h1>Tâches Staff</h1>
        <p class="page-subtitle" id="task-count">Chargement…</p>
      </div>
      <button id="new-task-btn" class="btn btn-primary">+ Nouvelle tâche</button>
    </div>

    <div id="task-board" class="task-kanban">
      <div class="spinner-wrap" style="grid-column:1/-1"><div class="spinner"></div></div>
    </div>

  </main>
</div>

<!-- Modal overlay -->
<div id="task-modal-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500"></div>

<!-- Modal création/édition -->
<div id="task-modal" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:501;width:100%;max-width:500px;padding:16px">
  <div class="form-card" style="background:var(--bg-card);border:1px solid var(--border)">
    <h2 id="task-modal-title" style="margin-bottom:20px;font-size:1.05rem">Nouvelle tâche</h2>
    <form id="task-form">
      <div class="form-group">
        <label>Titre <span class="required">*</span></label>
        <input id="t-title" type="text" class="form-control" placeholder="Intitulé de la tâche" required />
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea id="t-desc" class="form-control" style="min-height:80px" placeholder="Détails optionnels…"></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Assigné à</label>
          <select id="t-assignee" class="form-control">
            <option value="">Tous</option>
          </select>
        </div>
        <div class="form-group">
          <label>Priorité</label>
          <select id="t-priority" class="form-control">
            <option value="haute">🔴 Haute</option>
            <option value="normale" selected>🟡 Normale</option>
            <option value="basse">🟢 Basse</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Date limite (optionnel)</label>
        <input id="t-due" type="date" class="form-control" />
      </div>
      <div class="form-actions">
        <button type="button" id="task-cancel-btn" class="btn btn-secondary">Annuler</button>
        <button type="submit" id="task-submit-btn" class="btn btn-primary">Créer</button>
      </div>
    </form>
  </div>
</div>

<script type="module" src="/js/page-tasks.js"></script>
</body>
</html>
