<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Règlement — FratWorld Staff</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<div class="app-wrapper">
  <div id="navbar"></div>
  <main class="page-content">

    <div class="page-header">
      <div class="page-header-left">
        <h1>Règlement du Serveur</h1>
        <p class="page-subtitle">Recherche instantanée dans l'intégralité du règlement FratWorld RP</p>
      </div>
    </div>

    <div class="reglement-header">
      <div class="reglement-search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="reglement-search" class="reglement-search"
               placeholder="Rechercher : powergaming, braquage, rançon, alliance…"
               autocomplete="off" />
      </div>
      <div class="reglement-results" id="reglement-results"></div>
    </div>

    <div id="reglement-sections" class="reglement-sections">
      <div class="spinner-wrap"><div class="spinner"></div></div>
    </div>

  </main>
</div>
<script type="module" src="/js/page-reglement.js"></script>
</body>
</html>
