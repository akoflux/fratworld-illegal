<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Décisions — FratWorld Staff</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<div class="app-wrapper">
  <div id="navbar"></div>
  <main class="page-content">

    <div class="page-header">
      <div class="page-header-left">
        <h1 id="section-label">Décisions</h1>
        <p class="page-subtitle" id="entries-count">Chargement…</p>
      </div>
      <a id="new-entry-btn" href="/entry-form.html?section=decisions" class="btn btn-primary">+ Nouvelle entrée</a>
    </div>

    <!-- Onglets de section -->
    <div class="section-tabs">
      <button class="section-tab active" data-section="decisions">Décisions</button>
      <button class="section-tab" data-section="factions">Factions</button>
      <button class="section-tab" data-section="propositions">Propositions</button>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="toolbar-left">
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" id="search-input" class="search-input" placeholder="Rechercher…" autocomplete="off" />
        </div>
        <select id="filter-cat" class="filter-select">
          <option value="">Toutes catégories</option>
          <optgroup label="Décisions">
            <option value="Position officielle">Position officielle</option>
            <option value="Règle tranchée">Règle tranchée</option>
            <option value="Historique débat">Historique débat</option>
          </optgroup>
          <optgroup label="Factions">
            <option value="Fiche faction">Fiche faction</option>
            <option value="Règle faction">Règle faction</option>
            <option value="Accord inter-faction">Accord inter-faction</option>
          </optgroup>
          <optgroup label="Propositions">
            <option value="Proposition règlement">Proposition règlement</option>
            <option value="Idée mécanique">Idée mécanique</option>
            <option value="Ajout serveur (règle, mécanique)">Ajout serveur</option>
            <option value="Autre">Autre</option>
          </optgroup>
        </select>
        <select id="filter-status" class="filter-select">
          <option value="">Tous statuts</option>
          <option value="Validé">Validé</option>
          <option value="Refusé">Refusé</option>
          <option value="En débat">En débat</option>
          <option value="En attente">En attente</option>
          <option value="Archivée">Archivée</option>
        </select>
        <select id="filter-factions" class="filter-select">
          <option value="">Toutes factions</option>
          <option value="Cartel">Cartel</option>
          <option value="Mafia">Mafia</option>
          <option value="MC / Groupe atypique">MC / Groupe atypique</option>
          <option value="Gang">Gang</option>
          <option value="Indépendant">Indépendant</option>
          <option value="Toutes">Toutes</option>
        </select>
        <button id="archived-toggle" class="archived-toggle" title="Afficher / masquer les entrées archivées">
          🗄 Archivées
        </button>
      </div>
      <div class="toolbar-right">
        <div class="view-toggle">
          <button class="view-toggle-btn" id="btn-view-cards" title="Vue cards">⊞</button>
          <button class="view-toggle-btn" id="btn-view-table" title="Vue tableau">☰</button>
          <button class="view-toggle-btn" id="btn-view-kanban" title="Vue kanban">⊟</button>
        </div>
      </div>
    </div>

    <div id="entries-container">
      <div class="spinner-wrap"><div class="spinner"></div></div>
    </div>

  </main>
</div>
<script type="module" src="/js/page-entries.js"></script>
</body>
</html>
