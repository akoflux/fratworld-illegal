<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Utilisateurs — FratWorld Staff</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<div class="app-wrapper">
  <div id="navbar"></div>
  <main class="page-content">

    <div class="page-header">
      <div class="page-header-left">
        <h1>Administration</h1>
        <p class="page-subtitle">Gestion des comptes et des rôles</p>
      </div>
      <button id="create-user-btn" class="btn btn-primary">+ Créer un compte</button>
    </div>

    <!-- Panneau de création -->
    <div id="create-panel" style="display:none;margin-bottom:28px">
      <div class="form-card">
        <div class="form-section-title" style="margin-bottom:16px">Nouveau compte</div>
        <div class="form-row">
          <div class="form-group">
            <label>Nom d'affichage <span class="required">*</span></label>
            <input id="new-displayname" type="text" class="form-control" placeholder="Prénom Nom" />
          </div>
          <div class="form-group">
            <label>Email <span class="required">*</span></label>
            <input id="new-email" type="email" class="form-control" placeholder="prenom.nom@example.com" />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Mot de passe <span class="required">*</span></label>
            <input id="new-password" type="password" class="form-control" placeholder="Min. 8 caractères" />
          </div>
          <div class="form-group">
            <label>Rôle</label>
            <select id="new-role" class="form-control">
              <option value="referent">Référent</option>
              <option value="admin">Admin</option>
            </select>
          </div>
        </div>
        <div class="form-actions">
          <button type="button" id="cancel-create-btn" class="btn btn-secondary">Annuler</button>
          <button type="button" id="confirm-create-btn" class="btn btn-primary">Créer le compte</button>
        </div>
      </div>
    </div>

    <!-- Liste des utilisateurs -->
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">Utilisateurs actifs</span>
        <span id="user-count" style="font-size:.8rem;color:var(--text-muted)">Chargement…</span>
      </div>
      <div class="panel-body" style="padding:10px">
        <div id="user-list" class="user-list">
          <div class="spinner-wrap"><div class="spinner"></div></div>
        </div>
      </div>
    </div>

  </main>
</div>
<script type="module" src="/js/page-admin-users.js"></script>
</body>
</html>
