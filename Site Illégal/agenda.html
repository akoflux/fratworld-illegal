<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agenda — FratWorld Staff</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<div class="app-wrapper">
  <div id="navbar"></div>
  <main class="page-content">

    <div class="page-header">
      <div class="page-header-left">
        <h1>Agenda</h1>
        <p class="page-subtitle">Réunions, événements et deadlines de vote</p>
      </div>
      <button id="new-event-btn" class="btn btn-primary">+ Ajouter un événement</button>
    </div>

    <!-- Légende -->
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px">
      <span class="agenda-type-badge agenda-type-reunion">Réunion</span>
      <span class="agenda-type-badge agenda-type-evenement">Événement</span>
      <span class="agenda-type-badge agenda-type-deadline">Deadline vote</span>
      <span class="agenda-type-badge agenda-type-autre">Autre</span>
    </div>

    <div id="agenda-container">
      <div class="spinner-wrap"><div class="spinner"></div></div>
    </div>

  </main>
</div>

<!-- Modal overlay -->
<div id="agenda-modal-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500"></div>

<!-- Modal ajout événement -->
<div id="agenda-modal" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:501;width:100%;max-width:460px;padding:16px">
  <div class="form-card" style="background:var(--bg-card);border:1px solid var(--border)">
    <h2 style="margin-bottom:20px;font-size:1.05rem">Nouvel événement</h2>
    <form id="agenda-form">
      <div class="form-group">
        <label>Titre <span class="required">*</span></label>
        <input id="a-title" type="text" class="form-control" placeholder="Ex : Réunion hebdo staff" required />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Date &amp; heure <span class="required">*</span></label>
          <input id="a-date" type="datetime-local" class="form-control" required />
        </div>
        <div class="form-group">
          <label>Type</label>
          <select id="a-type" class="form-control">
            <option value="reunion">Réunion</option>
            <option value="evenement">Événement serveur</option>
            <option value="autre">Autre</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea id="a-desc" class="form-control" style="min-height:70px" placeholder="Détails optionnels…"></textarea>
      </div>
      <div class="form-actions">
        <button type="button" id="agenda-cancel-btn" class="btn btn-secondary">Annuler</button>
        <button type="submit" id="agenda-submit-btn" class="btn btn-primary">Ajouter</button>
      </div>
    </form>
  </div>
</div>

<script type="module" src="/js/page-agenda.js"></script>
</body>
</html>
