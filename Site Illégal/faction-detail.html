<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Membres Faction — FratWorld Staff</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<div class="app-wrapper">
  <div id="navbar"></div>
  <main class="page-content">

    <div class="page-header">
      <div class="page-header-left">
        <a href="/factions.html" class="btn btn-secondary btn-sm" style="margin-bottom:10px">← Factions</a>
        <h1 id="faction-nom" style="margin-bottom:4px">—</h1>
        <p id="faction-meta" class="page-subtitle"></p>
      </div>
      <div id="faction-header-actions" style="display:flex;gap:8px;align-items:flex-end"></div>
    </div>

    <!-- Infos faction -->
    <div class="detail-card" style="margin-bottom:20px">
      <div class="card-header-bar"><h3>Informations</h3></div>
      <div class="card-content" id="faction-info-body">
        <div class="spinner-wrap"><div class="spinner"></div></div>
      </div>
    </div>

    <!-- Membres -->
    <div class="detail-card">
      <div class="card-header-bar">
        <h3>Membres <span id="membre-count" style="font-size:.75rem;font-weight:400;color:var(--text-muted)"></span></h3>
        <div style="display:flex;gap:8px" id="membre-actions"></div>
      </div>
      <div id="membres-body">
        <div class="spinner-wrap"><div class="spinner"></div></div>
      </div>
    </div>

    <!-- Entrées liées (dashboard par faction) -->
    <div class="detail-card" style="margin-top:20px">
      <div class="card-header-bar">
        <h3>Entrées liées</h3>
        <span id="faction-entries-count" style="font-size:.75rem;color:var(--text-muted)">—</span>
      </div>
      <div id="faction-entries-body">
        <div class="spinner-wrap"><div class="spinner"></div></div>
      </div>
    </div>

    <!-- Timeline -->
    <div class="detail-card" style="margin-top:20px">
      <div class="card-header-bar">
        <h3>Timeline</h3>
        <div style="display:flex;gap:8px;align-items:center">
          <span id="timeline-count" style="font-size:.75rem;color:var(--text-muted)">—</span>
          <button id="add-event-btn" class="btn btn-secondary btn-sm" style="display:none">+ Événement</button>
        </div>
      </div>
      <div id="timeline-body">
        <div class="spinner-wrap"><div class="spinner"></div></div>
      </div>
    </div>

  </main>
</div>

<!-- Overlay modal -->
<div class="modal-overlay" id="membre-modal-overlay" style="display:none"></div>
<div class="modal-overlay" id="faction-modal-overlay" style="display:none"></div>
<div class="modal-overlay" id="event-modal-overlay" style="display:none"></div>

<!-- Modal modifier faction -->
<div id="faction-info-modal" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:501;width:100%;max-width:560px;padding:20px;max-height:90vh;overflow-y:auto">
  <div class="form-card" style="background:var(--bg-card);border:1px solid var(--border)">
    <h2 style="margin-bottom:20px;font-size:1.1rem">Modifier les informations</h2>
    <form id="faction-info-form">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="form-group">
          <label>Nom <span class="required">*</span></label>
          <input id="fi-nom" type="text" class="form-control" required />
        </div>
        <div class="form-group">
          <label>Type</label>
          <select id="fi-type" class="form-control">
            <option>Gang</option><option>Mafia</option><option>Cartel</option>
            <option>MC / Groupe atypique</option><option>Indépendant</option>
          </select>
        </div>
        <div class="form-group">
          <label>Lead</label>
          <input id="fi-lead" type="text" class="form-control" />
        </div>
        <div class="form-group">
          <label>Co-Lead</label>
          <input id="fi-colead" type="text" class="form-control" />
        </div>
        <div class="form-group">
          <label>Activité / Business</label>
          <input id="fi-business" type="text" class="form-control" />
        </div>
        <div class="form-group">
          <label>Statut faction</label>
          <select id="fi-statut" class="form-control">
            <option>Actif</option><option>Inactif</option><option>Dissout</option>
          </select>
        </div>
        <div class="form-group">
          <label>Téléphone RP</label>
          <input id="fi-tel" type="text" class="form-control" placeholder="Ex : 555-1234" />
        </div>
        <div class="form-group">
          <label>Statut relation staff</label>
          <select id="fi-relation" class="form-control">
            <option value="">— Non défini —</option>
            <option value="Allié">🤝 Allié</option>
            <option value="Neutre">⚖️ Neutre</option>
            <option value="Surveillé">👁 Surveillé</option>
            <option value="Hostile">⚠️ Hostile</option>
          </select>
        </div>
        <div class="form-group">
          <label>Dernier contact</label>
          <input id="fi-contact" type="date" class="form-control" />
        </div>
      </div>
      <div class="form-group">
        <label>Notes internes</label>
        <textarea id="fi-notes" class="form-control" style="min-height:80px"></textarea>
      </div>
      <div class="form-group">
        <label>Notes confidentielles <span style="font-size:.72rem;color:var(--text-muted)">(admin seulement)</span></label>
        <textarea id="fi-notes-conf" class="form-control" style="min-height:80px"></textarea>
      </div>
      <div class="form-actions">
        <button type="button" id="faction-modal-cancel" class="btn btn-secondary">Annuler</button>
        <button type="submit" id="faction-modal-submit" class="btn btn-primary">Enregistrer</button>
      </div>
    </form>
  </div>
</div>

<!-- Modal ajouter événement timeline -->
<div id="event-modal" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:501;width:100%;max-width:440px;padding:20px">
  <div class="form-card" style="background:var(--bg-card);border:1px solid var(--border)">
    <h2 style="margin-bottom:20px;font-size:1.1rem">Ajouter un événement</h2>
    <form id="event-form">
      <div class="form-group">
        <label>Titre <span class="required">*</span></label>
        <input id="ev-title" type="text" class="form-control" required />
      </div>
      <div class="form-group">
        <label>Date</label>
        <input id="ev-date" type="date" class="form-control" />
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea id="ev-desc" class="form-control" style="min-height:80px" placeholder="Contexte, décision, notes…"></textarea>
      </div>
      <div class="form-actions">
        <button type="button" id="event-modal-cancel" class="btn btn-secondary">Annuler</button>
        <button type="submit" id="event-modal-submit" class="btn btn-primary">Ajouter</button>
      </div>
    </form>
  </div>
</div>

<!-- Modal ajouter/modifier membre -->
<div id="membre-modal" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:501;width:100%;max-width:460px;padding:20px">
  <div class="form-card" style="background:var(--bg-card);border:1px solid var(--border)">
    <h2 id="membre-modal-title" style="margin-bottom:20px;font-size:1.1rem">Ajouter un membre</h2>
    <form id="membre-form">
      <div class="form-group">
        <label>Pseudo <span class="required">*</span></label>
        <input id="m-pseudo" type="text" class="form-control" placeholder="Ex : Shadowbane" required />
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="form-group">
          <label>ID CFX</label>
          <input id="m-cfx" type="text" class="form-control" placeholder="Ex : 123456" />
        </div>
        <div class="form-group">
          <label>ID Joueur</label>
          <input id="m-joueur" type="text" class="form-control" placeholder="Ex : 42" />
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="form-group">
          <label>Rôle dans la faction</label>
          <select id="m-role" class="form-control">
            <option value="Membre">Membre</option>
            <option value="Sous-chef">Sous-chef</option>
            <option value="Chef">Chef</option>
          </select>
        </div>
        <div class="form-group">
          <label>Statut</label>
          <select id="m-statut" class="form-control">
            <option value="Actif">Actif</option>
            <option value="Inactif">Inactif</option>
            <option value="Banni">Banni</option>
          </select>
        </div>
      </div>
      <div class="form-actions">
        <button type="button" id="membre-cancel-btn" class="btn btn-secondary">Annuler</button>
        <button type="submit"  id="membre-submit-btn" class="btn btn-primary">Ajouter</button>
      </div>
    </form>
  </div>
</div>

<script type="module" src="/js/page-faction-detail.js"></script>
</body>
</html>
