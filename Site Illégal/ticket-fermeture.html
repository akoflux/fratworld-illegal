<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Timestamp Fermeture Ticket — FratWorld Staff</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    .ticket-wrap   { max-width: 560px; margin: 0 auto; }
    .preset-row    { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
    .preset-btn {
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12.5px;
      cursor: pointer;
      font-family: 'Fira Code', monospace;
      transition: all .15s;
    }
    .preset-btn:hover  { border-color: var(--accent, #c0392b); color: var(--text); }
    .preset-btn.active { background: rgba(192,57,43,.15); border-color: #c0392b; color: #ff8a75; }

    .time-row     { display: flex; gap: 12px; margin-bottom: 16px; }
    .time-row .form-group { flex: 1; margin-bottom: 0; }

    .ticket-preview-date {
      font-family: 'Fira Code', monospace;
      font-size: .82rem;
      color: var(--text-secondary);
      margin: 0 0 18px;
    }
    .ticket-preview-date strong { color: var(--text); }

    .output-header {
      display: flex; align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .output-header label { margin: 0; }

    .copy-btn {
      background: var(--accent, #c0392b);
      color: #fff;
      border: none;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }
    .copy-btn:hover  { opacity: .85; }
    .copy-btn.copied { background: var(--s-valid, #22c55e); }

    .discord-preview {
      background: #313338;
      border-radius: 10px;
      padding: 16px 18px;
      font-size: 14px;
      color: #dbdee1;
      line-height: 1.6;
      border-left: 3px solid #c0392b;
    }
    .discord-preview b   { color: #fff; }
    .discord-preview .ts {
      color: #f2c744;
      background: #3b3d42;
      padding: 1px 5px;
      border-radius: 4px;
      font-size: 13px;
      font-family: 'Fira Code', monospace;
    }

    .ticket-output {
      width: 100%;
      min-height: 160px;
      background: var(--bg-input, var(--bg-card));
      border: 1px solid var(--border);
      color: var(--text);
      padding: 14px;
      border-radius: 8px;
      font-family: 'Fira Code', monospace;
      font-size: 13px;
      line-height: 1.6;
      resize: vertical;
      outline: none;
    }
    .ticket-output:focus { border-color: var(--accent, #c0392b); }
  </style>
</head>
<body>
<div class="app-wrapper">
  <div id="navbar"></div>
  <main class="page-content">

    <div class="page-header">
      <div class="page-header-left">
        <h1>Timestamp — Fermeture de ticket</h1>
        <p class="page-subtitle">
          Génère un message Discord avec un timestamp dynamique. Le délai s'adapte à l'heure de chaque utilisateur.
        </p>
      </div>
    </div>

    <div class="ticket-wrap">

      <!-- Délai -->
      <div class="detail-card" style="margin-bottom:16px">
        <div class="card-header-bar"><h3>Délai avant fermeture</h3></div>
        <div class="card-content">
          <div class="preset-row" id="presets"></div>
          <div class="time-row">
            <div class="form-group">
              <label class="form-label">Heures</label>
              <input type="number" id="hours" min="0" value="12" class="form-control"
                     style="font-family:'Fira Code',monospace" />
            </div>
            <div class="form-group">
              <label class="form-label">Minutes</label>
              <input type="number" id="minutes" min="0" max="59" value="0" class="form-control"
                     style="font-family:'Fira Code',monospace" />
            </div>
          </div>
          <p class="ticket-preview-date">Fermeture le <strong id="previewDate">—</strong></p>
        </div>
      </div>

      <!-- Message généré -->
      <div class="detail-card" style="margin-bottom:16px">
        <div class="card-header-bar">
          <h3>Message à copier</h3>
          <button class="copy-btn" id="copyBtn">Copier</button>
        </div>
        <div class="card-content">
          <textarea class="ticket-output" id="output" readonly></textarea>
        </div>
      </div>

      <!-- Aperçu Discord -->
      <div class="detail-card">
        <div class="card-header-bar"><h3>Aperçu Discord</h3></div>
        <div class="card-content">
          <div class="discord-preview" id="discordPreview"></div>
        </div>
      </div>

    </div>
  </main>
</div>
<script type="module" src="/js/page-ticket.js"></script>
</body>
</html>
