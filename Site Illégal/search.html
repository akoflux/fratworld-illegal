<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recherche — FratWorld Staff</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<div class="app-wrapper">
  <div id="navbar"></div>
  <main class="page-content">

    <div class="page-header">
      <div class="page-header-left">
        <h1>Recherche globale</h1>
        <p class="page-subtitle">Cherche dans toutes les décisions, propositions et factions</p>
      </div>
    </div>

    <div style="margin-bottom:28px">
      <div class="search-wrap" style="max-width:600px">
        <span class="search-icon">🔍</span>
        <input type="text" id="global-search" class="search-input" style="font-size:1rem;padding:12px 16px 12px 40px"
               placeholder="Rechercher un titre, une règle, une faction…" autocomplete="off" />
      </div>
      <div id="search-hint" style="margin-top:8px;font-size:.8rem;color:var(--text-muted)">Tape au moins 2 caractères pour lancer la recherche.</div>
    </div>

    <div id="search-results"></div>

  </main>
</div>
<script type="module" src="/js/page-search.js"></script>
</body>
</html>
