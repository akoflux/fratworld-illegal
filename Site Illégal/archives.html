<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Archives — FratWorld Staff</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<div class="app-wrapper">
  <div id="navbar"></div>
  <main class="page-content">

    <div class="page-header">
      <div class="page-header-left">
        <h1>Archives</h1>
        <p class="page-subtitle" id="archive-count">Chargement…</p>
      </div>
    </div>

    <!-- Filtres -->
    <div class="toolbar" style="margin-bottom:20px">
      <div class="toolbar-left">
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" id="search-input" class="search-input" placeholder="Rechercher…" autocomplete="off" />
        </div>
        <div class="section-tabs" style="margin:0">
          <button class="section-tab active" data-type="all">Tout</button>
          <button class="section-tab" data-type="decisions">Décisions</button>
          <button class="section-tab" data-type="propositions">Propositions</button>
          <button class="section-tab" data-type="dossiers">Dossiers</button>
        </div>
        <select id="sort-select" class="filter-select">
          <option value="date-desc">Plus récents</option>
          <option value="date-asc">Plus anciens</option>
          <option value="alpha">A → Z</option>
        </select>
      </div>
    </div>

    <div id="archives-container">
      <div class="spinner-wrap"><div class="spinner"></div></div>
    </div>

  </main>
</div>
<script type="module" src="/js/page-archives.js"></script>
</body>
</html>
