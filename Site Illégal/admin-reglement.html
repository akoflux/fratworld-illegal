<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Éditeur Règlement — FratWorld Staff</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<div class="app-wrapper">
  <div id="navbar"></div>
  <main class="page-content">

    <div class="page-header">
      <div class="page-header-left">
        <a href="/reglement.html" class="btn btn-secondary btn-sm" style="margin-bottom:10px">← Règlement</a>
        <h1>Éditeur du règlement</h1>
        <p class="page-subtitle">Modifiez et versionné le règlement FratWorld RP</p>
      </div>
      <div style="display:flex;gap:8px;align-items:flex-end">
        <button id="add-section-btn" class="btn btn-secondary">+ Section</button>
        <button id="publish-btn" class="btn btn-primary">💾 Publier</button>
      </div>
    </div>

    <div id="reglement-editor">
      <div class="spinner-wrap"><div class="spinner"></div></div>
    </div>

    <!-- Historique -->
    <div class="panel" style="margin-top:24px">
      <div class="panel-header">
        <span class="panel-title">📜 Historique des versions</span>
        <span id="history-count" style="font-size:.75rem;color:var(--text-muted)">—</span>
      </div>
      <div class="panel-body" style="padding:14px 20px;max-height:300px;overflow-y:auto">
        <div id="history-list"><div class="spinner-wrap"><div class="spinner"></div></div></div>
      </div>
    </div>

  </main>
</div>
<script type="module" src="/js/page-admin-reglement.js"></script>
</body>
</html>
