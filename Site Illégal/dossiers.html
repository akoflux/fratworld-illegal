<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dossiers Faction — FratWorld Staff</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    .dossiers-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; }
    .modal-overlay.open { display: flex !important; }
  </style>
</head>
<body>
<div class="app-wrapper">
  <div id="navbar"></div>
  <main class="page-content">

    <div class="page-header">
      <div class="page-header-left">
        <h1>Dossiers Création Faction</h1>
        <p class="page-subtitle">
          <span id="active-count">0</span> en cours ·
          <span id="archived-count">0</span> archivés ·
          Seuil : <span id="dossier-threshold">3</span>/<span id="dossier-ref-count">5</span> votes
        </p>
      </div>
      <div style="display:flex;gap:8px">
        <button id="toggle-archived" class="btn btn-secondary">Voir l'historique</button>
        <button id="new-dossier-btn" class="btn btn-primary">+ Nouveau dossier</button>
      </div>
    </div>

    <!-- Toolbar filtres -->
    <div class="dossier-toolbar">
      <div class="search-wrap" style="flex:1;min-width:160px">
        <span class="search-icon">🔍</span>
        <input type="text" id="dos-search" class="search-input" placeholder="Rechercher…" autocomplete="off" />
      </div>
      <select id="dos-filter-type" class="filter-select-sm">
        <option value="">Tous types</option>
        <option value="Gang">Gang</option>
        <option value="MC / Groupe atypique">MC / Groupe atypique</option>
        <option value="Mafia">Mafia</option>
        <option value="Cartel">Cartel</option>
      </select>
      <select id="dos-filter-author" class="filter-select-sm">
        <option value="">Tous auteurs</option>
      </select>
    </div>

    <!-- Dossiers actifs -->
    <div id="dossiers-active" class="dossiers-grid" style="margin-bottom:24px">
      <div class="spinner-wrap"><div class="spinner"></div></div>
    </div>

    <!-- Historique archivé -->
    <div id="archived-section" style="display:none">
      <h2 style="font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text-muted);margin-bottom:14px">Historique</h2>
      <div id="dossiers-archived" class="dossiers-grid"></div>
    </div>

  </main>
</div>

<!-- Modal overlay (click outside) -->
<div class="modal-overlay" id="dossier-modal-overlay" style="display:none"></div>

<!-- Modal création dossier -->
<div id="dossier-modal" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:501;width:100%;max-width:480px;padding:20px">
  <div class="form-card" style="background:var(--bg-card);border:1px solid var(--border)">
    <h2 style="margin-bottom:20px;font-size:1.1rem">Nouveau dossier</h2>
    <form id="dossier-form">
      <div class="form-group">
        <label>Nom du groupe <span class="required">*</span></label>
        <input id="d-nom" type="text" class="form-control" placeholder="Ex : Los Diablos" required />
      </div>
      <div class="form-group">
        <label>Type de groupe <span class="required">*</span></label>
        <select id="d-type" class="form-control" required>
          <option value="">— Sélectionner —</option>
          <option value="Gang">Gang</option>
          <option value="MC / Groupe atypique">MC / Groupe atypique</option>
          <option value="Mafia">Mafia</option>
          <option value="Cartel">Cartel</option>
        </select>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Nom du contact <span class="required">*</span></label>
          <input id="d-contact-name" type="text" class="form-control" placeholder="Pseudo RP" required />
        </div>
        <div class="form-group">
          <label>Discord du contact</label>
          <input id="d-contact-discord" type="text" class="form-control" placeholder="@pseudo ou ID Discord" />
        </div>
      </div>
      <div class="form-group">
        <label>Lien du dossier <span class="required">*</span></label>
        <input id="d-lien" type="url" class="form-control" placeholder="https://docs.google.com/…" required />
        <span class="form-hint">Lien vers le Google Doc, Notion, etc.</span>
      </div>
      <div class="form-group">
        <label>Description courte</label>
        <textarea id="d-desc" class="form-control" style="min-height:80px" placeholder="Quelques mots sur le groupe…"></textarea>
      </div>
      <div class="form-group">
        <label>Deadline de vote <span style="color:var(--text-muted);font-weight:400">(optionnel)</span></label>
        <input id="d-deadline" type="datetime-local" class="form-control" />
        <span class="form-hint">Si définie, les votes seront clôturés après cette date.</span>
      </div>
      <div class="form-group">
        <label class="toggle-label" style="display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none">
          <input type="checkbox" id="d-mention-staff" checked
            style="width:16px;height:16px;accent-color:var(--accent);cursor:pointer;flex-shrink:0" />
          <span style="font-size:.88rem;font-weight:600;color:var(--text-secondary)">Mentionner les gestionnaires Discord</span>
        </label>
        <span class="form-hint" style="margin-left:26px">Si coché, le webhook Discord pingue les gestionnaires à la création du dossier.</span>
      </div>
      <div class="form-actions">
        <button type="button" id="modal-cancel-btn" class="btn btn-secondary">Annuler</button>
        <button type="submit" id="d-submit" class="btn btn-primary">Créer le dossier</button>
      </div>
    </form>
  </div>
</div>

<!-- Picker statut (flottant) -->
<div id="status-picker" style="display:none;position:fixed;z-index:999"></div>

<!-- Overlay installation -->
<div id="installation-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500"
  onclick="cancelInstallation()"></div>

<!-- Modal installation faction -->
<div id="installation-modal" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:501;width:100%;max-width:500px;padding:20px">
  <div class="form-card" style="background:var(--bg-card);border:1px solid var(--border)">
    <h2 style="margin-bottom:6px;font-size:1.05rem">✅ Créer la faction</h2>
    <p id="inst-nom-groupe" style="font-size:.85rem;color:var(--text-muted);margin-bottom:16px;font-style:italic"></p>
    <form id="installation-form">
      <div class="form-row">
        <div class="form-group">
          <label>Lead RP</label>
          <input id="inst-lead" type="text" class="form-control" placeholder="Prénom Nom" />
        </div>
        <div class="form-group">
          <label>Co-Lead RP</label>
          <input id="inst-colead" type="text" class="form-control" placeholder="Optionnel" />
        </div>
      </div>
      <div class="form-group">
        <label>Business / Activité principale</label>
        <input id="inst-business" type="text" class="form-control" placeholder="Trafic, blanchiment…" />
      </div>
      <div class="form-group">
        <label>Notes internes</label>
        <textarea id="inst-notes" class="form-control" style="min-height:60px" placeholder="Observations, comportements notables…"></textarea>
      </div>
      <div class="form-actions">
        <button type="button" onclick="cancelInstallation()" class="btn btn-secondary">Annuler</button>
        <button type="submit" class="btn btn-primary">✅ Créer la faction</button>
      </div>
    </form>
  </div>
</div>

<script>
  // Gestion du modal création dossier (non-module — s'exécute immédiatement)
  const _modal   = document.getElementById("dossier-modal");
  const _overlay = document.getElementById("dossier-modal-overlay");

  document.getElementById("new-dossier-btn").addEventListener("click", () => {
    _modal.style.display   = "block";
    _overlay.style.display = "flex";
  });
  _overlay.addEventListener("click", () => {
    _modal.style.display   = "none";
    _overlay.style.display = "none";
  });
  document.getElementById("modal-cancel-btn").addEventListener("click", () => {
    _modal.style.display   = "none";
    _overlay.style.display = "none";
  });
</script>
<script type="module" src="/js/page-dossiers.js"></script>
</body>
</html>
